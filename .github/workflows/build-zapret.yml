name: Build Zapret (winws)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Zapret on Windows (MSYS2)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Clone Zapret Repository
        run: git clone --depth 1 https://github.com/bol-van/zapret.git zapret-src

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-gcc
            git
            make

      - name: Compile winws
        shell: msys2 {0}
        run: |
          cd zapret-src
          export WINDIVERT_VERSION=2.2.2-A
          make -C tpws winws

      - name: Move Binary to Tauri Resource Directory
        run: |
          mkdir -p src-tauri/binaries
          cp zapret-src/binaries/winws/winws.exe src-tauri/binaries/winws-x86_64-pc-windows-msvc.exe

      - name: Upload winws Artifact
        uses: actions/upload-artifact@v4
        with:
          name: winws-binary
          path: src-tauri/binaries/winws-x86_64-pc-windows-msvc.exe

      # Bu aşamadan sonra asıl Tauri build workflow'u tetiklenebilir
      # veya bu workflow'un devamı olarak Tauri de build edilebilir.
