name: "Archey Vane: Production Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Official Zapret Binaries
        shell: bash
        run: |
          # Zapret reposunu indiriyoruz ama DERLEMİYORUZ.
          git clone --depth 1 https://github.com/bol-van/zapret.git zapret-src
          
          # Doğrudan bol-van'ın kendi derlediği resmi winws.exe'yi alıp projeye kopyalıyoruz.
          mkdir -p src-tauri/binaries
          cp zapret-src/binaries/winws/winws.exe src-tauri/binaries/winws-x86_64-pc-windows-msvc.exe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache (Build Speed Optimization)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Vane Release v__VERSION__"
          releaseBody: "Vane Otomatik Production Build. Archey Agency tarafından sağlanmıştır."
          releaseDraft: true
          prerelease: false