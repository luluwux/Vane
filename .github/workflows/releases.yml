name: "Archey Vane: Production Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # DİKKAT: Zapret indirme veya derleme adımı tamamen silindi!
      # Sistem doğrudan senin reponda (src-tauri/binaries/) duran 
      # güvenli ve onaylanmış winws.exe dosyasını kullanacak.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache (Build Speed Optimization)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Dependencies
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Vane Release v__VERSION__"
          releaseBody: "Vane Otomatik Production Build. Archey Agency tarafından sağlanmıştır."
          releaseDraft: true
          prerelease: false