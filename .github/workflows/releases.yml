name: "Archey Vane: Production Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone Zapret Repository
        run: git clone --depth 1 https://github.com/bol-van/zapret.git zapret-src

      - name: Setup Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: make gcc-core zlib-devel git

      - name: Compile winws
        shell: cmd
        run: |
          C:\cygwin64\bin\bash.exe --login -c "cd $(cygpath '${{ github.workspace }}')/zapret-src/winws && make"

      - name: Prepare Binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp zapret-src/winws/winws.exe src-tauri/binaries/winws-x86_64-pc-windows-msvc.exe
          cp /c/cygwin64/bin/cygwin1.dll src-tauri/binaries/cygwin1.dll
          cp /c/cygwin64/bin/zlib1.dll src-tauri/binaries/zlib1.dll || echo "zlib1.dll not found, might be statically linked"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Vane Release v__VERSION__"
          releaseBody: "Vane Otomatik Production Build. Archey Agency tarafından sağlanmıştır."
          releaseDraft: true
          prerelease: false